repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-format
      - id: ruff
        args: ["--fix"]
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.2
    hooks:
      - id: mypy
        args: ["src/mutoracle"]
        additional_dependencies:
          - pydantic>=2.8
          - pyyaml>=6.0.2
          - typer>=0.12.5
          - rich>=13.7
          - types-pyyaml>=6.0.12
