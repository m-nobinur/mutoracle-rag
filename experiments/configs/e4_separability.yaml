experiment:
  id: e4_separability
  title: "E4 mutation ablation and operator separability"
  output_dir: experiments/results/e4_separability

dataset:
  path: data/fits/fits_v1.0.0/fits.jsonl
  split: test

smoke:
  query_limit: 5
  seeds: [13, 42, 91]

dev:
  query_limit: 20
  seeds: [13]

full:
  query_limit: 240
  seeds: [13, 42, 91]

cost_gate:
  estimated_cost_per_example_usd: 0.0
  max_estimated_cost_usd: 0.5
  require_smoke_before_full: true

ablation:
  variants:
    - name: all_operators
      oracles: [nli, semantic_similarity, llm_judge]
      aggregation: weighted
      weights:
        nli: 0.4
        semantic_similarity: 0.3
        llm_judge: 0.3
      operators: [CI, CR, CS, QP, QN, FS, FA]
      delta_threshold: 0.05
    - name: drop_retrieval_operators
      oracles: [nli, semantic_similarity, llm_judge]
      aggregation: weighted
      weights:
        nli: 0.4
        semantic_similarity: 0.3
        llm_judge: 0.3
      operators: [QP, QN, FS, FA]
      delta_threshold: 0.05
    - name: drop_prompt_operators
      oracles: [nli, semantic_similarity, llm_judge]
      aggregation: weighted
      weights:
        nli: 0.4
        semantic_similarity: 0.3
        llm_judge: 0.3
      operators: [CI, CR, CS, FS, FA]
      delta_threshold: 0.05
    - name: drop_generation_operators
      oracles: [nli, semantic_similarity, llm_judge]
      aggregation: weighted
      weights:
        nli: 0.4
        semantic_similarity: 0.3
        llm_judge: 0.3
      operators: [CI, CR, CS, QP, QN]
      delta_threshold: 0.05
